<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Art Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- Header -->
  <header class="a-header">
    <span class="a-logo">ADMIN</span>
    <div class="a-header-center">
      <span class="publish-status" id="publish-status"></span>
    </div>
    <div class="a-header-actions">
      <a href="https://wasabi-nasubi.github.io" target="_blank" class="a-btn a-btn-ghost">公開サイト →</a>
      <a href="/preview" target="_blank" class="a-btn a-btn-ghost">プレビュー</a>
      <button class="a-btn a-btn-primary" id="save-btn">保存 &amp; 公開</button>
    </div>
  </header>

  <div class="a-layout">

    <!-- Sidebar -->
    <nav class="a-sidebar">
      <button class="a-nav-item active" data-tab="settings">サイト設定</button>
      <button class="a-nav-item" data-tab="works">作品管理</button>
      <button class="a-nav-item" data-tab="about">About</button>
    </nav>

    <!-- Main -->
    <main class="a-main">

      <!-- ── Tab: サイト設定 ─────────────────────── -->
      <section class="a-tab active" id="tab-settings">
        <h2 class="a-section-title">サイト設定</h2>
        <div class="a-form">

          <div class="a-field">
            <label>サイト名 / 作家名</label>
            <input type="text" id="siteName" placeholder="YOUR NAME">
          </div>

          <div class="a-field">
            <label>キャッチフレーズ</label>
            <input type="text" id="tagline" placeholder="Art & Photography">
          </div>

          <div class="a-field">
            <label>STORES ショップ URL</label>
            <input type="url" id="storesUrl" placeholder="https://yourname.stores.jp">
          </div>

          <div class="a-field">
            <label>Instagram URL <span class="a-optional">（任意）</span></label>
            <input type="url" id="instagramUrl" placeholder="https://instagram.com/yourname">
          </div>

          <div class="a-field">
            <label>アクセントカラー（赤など）</label>
            <div class="a-color-row">
              <input type="color" id="accentColor" value="#cc0000">
              <input type="text" id="accentColorText" placeholder="#cc0000" maxlength="7">
            </div>
          </div>

          <div class="a-field">
            <label>ヒーロー背景画像 <span class="a-optional">（任意・薄く敷かれます）</span></label>
            <div class="a-upload-zone" id="hero-upload-zone">
              <img id="hero-preview" src="" alt="" style="display:none">
              <div id="hero-upload-hint" class="a-upload-hint">
                <span class="a-upload-icon">↑</span>
                <span>クリックまたはドラッグ&amp;ドロップ</span>
              </div>
              <input type="file" id="hero-file-input" accept="image/*" hidden>
            </div>
            <button class="a-btn-link" id="hero-clear-btn" style="display:none">画像を削除</button>
            <input type="hidden" id="heroBackgroundImage">
          </div>

        </div>
      </section>

      <!-- ── Tab: 作品管理 ──────────────────────── -->
      <section class="a-tab" id="tab-works">

        <div class="a-tab-header">
          <h2 class="a-section-title">作品管理</h2>
          <button class="a-btn a-btn-primary" id="add-work-btn">＋ 作品を追加</button>
        </div>

        <!-- 作品フォーム -->
        <div class="a-work-form" id="work-form" style="display:none">
          <h3 id="work-form-title">新しい作品</h3>
          <div class="a-work-form-grid">

            <!-- 画像アップロード -->
            <div>
              <div class="a-upload-zone a-work-image-zone" id="work-image-zone">
                <img id="work-image-preview" src="" alt="" style="display:none">
                <div id="work-image-hint" class="a-upload-hint">
                  <span class="a-upload-icon">↑</span>
                  <span>作品画像</span>
                </div>
                <input type="file" id="work-file-input" accept="image/*" hidden>
              </div>
            </div>

            <!-- フィールド群 -->
            <div class="a-work-fields">
              <div class="a-field">
                <label>タイトル</label>
                <input type="text" id="wf-title" placeholder="Untitled No.01">
              </div>
              <div class="a-field-row">
                <div class="a-field">
                  <label>カテゴリ</label>
                  <select id="wf-category">
                    <option value="原画">原画</option>
                    <option value="写真作品">写真作品</option>
                    <option value="グッズ">グッズ</option>
                  </select>
                </div>
                <div class="a-field">
                  <label>制作年</label>
                  <input type="text" id="wf-year" placeholder="2024" maxlength="4">
                </div>
              </div>
              <div class="a-field-row">
                <div class="a-field">
                  <label>素材・技法</label>
                  <input type="text" id="wf-medium" placeholder="Oil on canvas">
                </div>
                <div class="a-field">
                  <label>サイズ</label>
                  <input type="text" id="wf-size" placeholder="600 × 800 mm">
                </div>
              </div>
              <div class="a-field-row">
                <div class="a-field">
                  <label>価格（税込）</label>
                  <input type="text" id="wf-price" placeholder="¥50,000">
                </div>
                <div class="a-field a-field-check">
                  <label class="a-check-label">
                    <input type="checkbox" id="wf-sold">
                    <span>SOLD（売り切れ）</span>
                  </label>
                </div>
              </div>
              <div class="a-field">
                <label>STORES 商品 URL</label>
                <input type="url" id="wf-storesUrl" placeholder="https://yourname.stores.jp/items/xxxxx">
              </div>
            </div>
          </div>

          <div class="a-work-form-actions">
            <button class="a-btn a-btn-primary" id="wf-save-btn">この作品を保存</button>
            <button class="a-btn a-btn-ghost" id="wf-cancel-btn">キャンセル</button>
          </div>
        </div>

        <!-- 作品リスト -->
        <div class="a-works-list" id="works-list"></div>

      </section>

      <!-- ── Tab: About ─────────────────────────── -->
      <section class="a-tab" id="tab-about">
        <h2 class="a-section-title">About</h2>
        <div class="a-form">

          <div class="a-field">
            <label>アーティスト写真 <span class="a-optional">（任意）</span></label>
            <div class="a-upload-zone a-portrait-zone" id="about-upload-zone">
              <img id="about-preview" src="" alt="" style="display:none">
              <div id="about-upload-hint" class="a-upload-hint">
                <span class="a-upload-icon">↑</span>
                <span>クリックまたはドラッグ&amp;ドロップ</span>
              </div>
              <input type="file" id="about-file-input" accept="image/*" hidden>
            </div>
            <button class="a-btn-link" id="about-clear-btn" style="display:none">画像を削除</button>
            <input type="hidden" id="aboutPhoto">
          </div>

          <div class="a-field">
            <label>プロフィール文</label>
            <p class="a-field-note">HTMLタグ使用可。改行は &lt;br&gt; を入力してください。</p>
            <textarea id="aboutBio" rows="10" placeholder="作家紹介文をここに書いてください。&#10;&#10;HTMLタグも使えます（改行は &lt;br&gt;）"></textarea>
          </div>

        </div>
      </section>

    </main>
  </div>

  <!-- Toast通知 -->
  <div class="a-toast" id="toast"></div>

  <script src="admin.js"></script>
</body>
</html>
