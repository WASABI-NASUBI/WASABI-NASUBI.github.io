<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style-v2.css">
</head>
<body>

  <!-- カスタムカーソル (デスクトップのみ) -->
  <div class="cursor-dot"  id="cursor-dot"></div>
  <div class="cursor-ring" id="cursor-ring"></div>

  <!-- ナビゲーション -->
  <nav class="nav" id="nav">
    <a href="#" class="nav-logo" id="site-name">ARTIST</a>
    <ul class="nav-links" id="nav-links">
      <li><a href="#works">Works</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="#" id="nav-shop" class="nav-shop" target="_blank" rel="noopener">Shop →</a></li>
    </ul>
    <button class="nav-toggle" id="nav-toggle" aria-label="メニュー">
      <span></span>
    </button>
  </nav>

  <!-- ヒーロー -->
  <section class="hero" id="hero">
    <div class="hero-inner">
      <div class="hero-name-wrap">
        <h1 class="hero-name" id="hero-name"></h1>
        <div class="hero-line" id="hero-line"></div>
      </div>
      <p class="hero-tagline" id="hero-tagline"></p>
      <a href="#works" class="hero-scroll" id="hero-scroll">
        <span>Works</span>
        <div class="hero-scroll-line"></div>
      </a>
    </div>
  </section>

  <!-- 作品 -->
  <section class="section" id="works">
    <div class="works-header">
      <h2 class="section-label">Works</h2>
      <div class="filter-bar" id="filter-bar"></div>
    </div>
    <div class="gallery" id="gallery"></div>
  </section>

  <!-- About -->
  <section class="section section-dark" id="about">
    <div class="about-inner" id="about-inner">
      <div class="about-photo-wrap" id="about-photo-wrap">
        <img src="" id="about-photo" alt="Artist photo">
      </div>
      <div class="about-text">
        <span class="about-label">About</span>
        <p class="about-bio" id="about-bio"></p>
        <div class="about-links">
          <a href="#" id="about-ig"   target="_blank" rel="noopener">Instagram</a>
          <a href="#" id="about-shop" target="_blank" rel="noopener">STORES Shop</a>
        </div>
      </div>
    </div>
  </section>

  <!-- フッター -->
  <footer class="footer">
    <p id="footer-copy"></p>
    <div class="footer-links">
      <a href="#" id="footer-stores" target="_blank" rel="noopener">STORES</a>
      <a href="#" id="footer-ig"     target="_blank" rel="noopener">Instagram</a>
    </div>
  </footer>

  <!-- ライトボックス -->
  <div class="lightbox" id="lightbox" aria-modal="true" role="dialog" aria-hidden="true">
    <button class="lb-close" id="lb-close" aria-label="閉じる">✕</button>
    <button class="lb-nav lb-prev" id="lb-prev" aria-label="前の作品">&#8592;</button>
    <button class="lb-nav lb-next" id="lb-next" aria-label="次の作品">&#8594;</button>
    <div class="lb-body">
      <div class="lb-img-wrap">
        <img class="lb-img" id="lb-img" src="" alt="">
      </div>
      <div class="lb-info">
        <div class="lb-info-left">
          <h3 class="lb-title"  id="lb-title"></h3>
          <p  class="lb-meta"   id="lb-meta"></p>
        </div>
        <div class="lb-info-right">
          <p class="lb-price" id="lb-price"></p>
          <a class="lb-cta"   id="lb-cta" href="#" target="_blank" rel="noopener">STORESで購入 →</a>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="main-v2.js"></script>
</body>
</html>
